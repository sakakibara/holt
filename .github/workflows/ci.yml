name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # Native build + full test suite on every platform holt ships for.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest          # x86_64-linux
          - ubuntu-24.04-arm       # aarch64-linux
          - macos-latest           # aarch64-macos
    steps:
      - uses: actions/checkout@v6

      - name: install zig
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            Linux-X64)    triple=x86_64-linux ;;
            Linux-ARM64)  triple=aarch64-linux ;;
            macOS-ARM64)  triple=aarch64-macos ;;
            *) echo "unsupported runner: ${{ runner.os }}-${{ runner.arch }}"; exit 1 ;;
          esac
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-${triple}-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-${triple}-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-cache-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-

      - name: zig build test
        run: zig build test --summary all

      - name: zig build (release)
        run: zig build -Doptimize=ReleaseSafe --summary all

  # Cross-compile every release target from one runner, so a break in any
  # shipped binary is caught before a tag is ever cut.
  cross-compile:
    name: cross (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-macos
          - x86_64-macos
          - aarch64-linux
          - x86_64-linux
          - x86_64-windows
          - aarch64-windows
    steps:
      - uses: actions/checkout@v6
      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          mkdir -p "$HOME/zig"
          curl -fsSL "$url" | tar -xJ -C "$HOME/zig"
          echo "$HOME/zig/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-cache-cross-${{ matrix.target }}-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-cross-${{ matrix.target }}-${{ env.ZIG_VERSION }}-
      - name: build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

  # Runs the full suite on real Windows; a required gate like the other platforms.
  test-windows:
    name: test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: install zig
        shell: bash
        run: |
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-windows-${ZIG_VERSION}.zip"
          curl -fsSL "$url" -o zig.zip
          7z x zig.zip -o"$HOME/zig" >/dev/null
          echo "$HOME/zig/zig-x86_64-windows-${ZIG_VERSION}" >> "$GITHUB_PATH"
      - uses: actions/cache@v5
        with:
          path: .zig-cache
          key: zig-cache-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-cache-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-
      - name: zig build test
        shell: bash
        run: zig build test --summary all

  # install.ps1 can't run end-to-end without a published Windows release, so
  # parse-check it on every push instead.
  install-script:
    name: install.ps1 parse-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: parse-check install.ps1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install.ps1), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          Write-Host 'install.ps1 parses cleanly'
